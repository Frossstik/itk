version: '3.9'

services:
  db:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: postgre
      POSTGRES_PASSWORD: 1111111b
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: wallet-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wallet
      SPRING_DATASOURCE_USERNAME: postgre
      SPRING_DATASOURCE_PASSWORD: 1111111b

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db